<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Interviews">
<title>Senior Engineer Interviews</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23111111'/%3E%3Cpath d='M8 16.5 L13.5 22 L24 10.5' stroke='white' stroke-width='3' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='34' fill='%23111111'/%3E%3Cpath d='M45 92 L76 124 L135 59' stroke='white' stroke-width='17' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
<style>
:root {
  --bg: #ffffff;
  --bg-soft: #f7f7f7;
  --ink: #111111;
  --ink-soft: #444444;
  --ink-faded: #888888;
  --line: #e3e3e3;
  --line-strong: #cccccc;
  --accent: #1a1a1a;
  --success: #1f6b3a;
  --warn: #b3520a;
  --danger: #b3261e;
  --shadow: 0 1px 2px rgba(0,0,0,0.04);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body { background: var(--bg); }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  color: var(--ink);
  font-size: 16px;
  line-height: 1.5;
  min-height: 100dvh;
  padding-top: env(safe-area-inset-top);
  -webkit-font-smoothing: antialiased;
}

.app {
  max-width: 680px;
  margin: 0 auto;
  padding: 20px 20px 32px;
  padding-bottom: calc(32px + env(safe-area-inset-bottom));
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
}

.screen { display: none; flex: 1; flex-direction: column; }
.screen.active { display: flex; }

/* ── Top bar ──────────────────────────────────────────────────────────── */

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--line);
  margin-bottom: 24px;
  gap: 12px;
}
.wordmark {
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--ink);
}
.wordmark .light { color: var(--ink-faded); font-weight: 400; }

.topbar-back {
  background: none;
  border: none;
  color: var(--ink-soft);
  font: inherit;
  font-size: 0.9rem;
  cursor: pointer;
  padding: 6px 0;
}
.topbar-back:hover { color: var(--ink); }
.topbar-back::before { content: '← '; }

/* ── Headings ─────────────────────────────────────────────────────────── */

h1 {
  font-size: 1.5rem;
  font-weight: 700;
  line-height: 1.3;
  margin-bottom: 6px;
}
.sub {
  color: var(--ink-soft);
  font-size: 0.95rem;
  margin-bottom: 24px;
}

.section-label {
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--ink-faded);
  margin-bottom: 10px;
}

/* ── Library ──────────────────────────────────────────────────────────── */

.library-stats {
  display: flex;
  gap: 16px;
  font-size: 0.85rem;
  color: var(--ink-faded);
  margin-bottom: 24px;
}
.library-stats strong { color: var(--ink); font-weight: 600; }

.new-cta-row {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 28px;
}
.new-cta {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  background: var(--ink);
  color: white;
  padding: 14px 20px;
  border-radius: 6px;
  border: 1px solid var(--ink);
  cursor: pointer;
  font: inherit;
  font-weight: 600;
  font-size: 0.95rem;
  width: 100%;
  min-height: 48px;
}
.new-cta:hover { background: #000; }
.new-cta-secondary {
  background: white;
  color: var(--ink);
  border-color: var(--line-strong);
}
.new-cta-secondary:hover { background: var(--bg-soft); border-color: var(--ink-soft); }

.type-pill {
  display: inline-block;
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.02em;
  padding: 2px 6px;
  border-radius: 3px;
  margin-right: 8px;
  vertical-align: middle;
}
.type-pill.type-hr { background: #eef4fb; color: #1f4f8b; }
.type-pill.type-tech { background: #f2efe6; color: #6b4f1a; }

.empty-state {
  border: 1px dashed var(--line-strong);
  border-radius: 6px;
  padding: 32px 20px;
  text-align: center;
  color: var(--ink-faded);
}
.empty-state strong { display: block; font-size: 1rem; color: var(--ink-soft); margin-bottom: 4px; font-weight: 600; }

.list-heading {
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--ink-faded);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 10px;
  margin-top: 24px;
}
.list-heading:first-child { margin-top: 0; }

.interview-list { display: flex; flex-direction: column; gap: 8px; }

.interview-card {
  background: white;
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 14px 16px;
  cursor: pointer;
  text-align: left;
  font: inherit;
  color: inherit;
  width: 100%;
  transition: border-color 0.1s;
}
.interview-card:hover { border-color: var(--ink-soft); }

.card-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 12px;
  margin-bottom: 4px;
}
.card-name { font-size: 1.02rem; font-weight: 600; }
.card-meta { font-size: 0.8rem; color: var(--ink-faded); white-space: nowrap; }
.card-detail {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
  font-size: 0.85rem;
  color: var(--ink-soft);
}
.card-role { color: var(--ink-faded); }

.status {
  display: inline-block;
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.02em;
  padding: 3px 8px;
  border-radius: 3px;
  white-space: nowrap;
}
.status-progress { background: #fff4e5; color: var(--warn); }
.status-done { background: var(--bg-soft); color: var(--ink-soft); }
.status-strong { background: #e6f4ea; color: var(--success); }
.status-maybe { background: var(--bg-soft); color: var(--ink-soft); }
.status-no { background: #fbe9e7; color: var(--danger); }
.status-draft { background: var(--bg-soft); color: var(--ink-faded); }

.library-footer {
  margin-top: auto;
  padding-top: 32px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  font-size: 0.85rem;
  color: var(--ink-faded);
  border-top: 1px solid var(--line);
}
.footer-link {
  background: none;
  border: none;
  color: var(--ink-soft);
  cursor: pointer;
  font: inherit;
  text-align: left;
  padding: 8px 0;
  text-decoration: underline;
}
.footer-link:hover { color: var(--ink); }
.footer-link.danger { color: var(--danger); }

/* ── Forms ────────────────────────────────────────────────────────────── */

.field { margin-bottom: 16px; }
.field-label {
  display: block;
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--ink-soft);
  margin-bottom: 6px;
}
.field-label .req { color: var(--danger); }

input[type=text], input[type=date], textarea {
  width: 100%;
  padding: 11px 12px;
  font: inherit;
  font-size: 16px; /* prevents iOS zoom */
  color: var(--ink);
  background: white;
  border: 1px solid var(--line-strong);
  border-radius: 5px;
  -webkit-appearance: none;
  appearance: none;
}
input:focus, textarea:focus {
  outline: none;
  border-color: var(--ink);
  box-shadow: 0 0 0 3px rgba(0,0,0,0.06);
}
input::placeholder, textarea::placeholder { color: var(--ink-faded); }

textarea {
  resize: vertical;
  min-height: 88px;
  line-height: 1.5;
  font-size: 15px;
}

/* ── Question screen ─────────────────────────────────────────────────── */

.q-status {
  display: flex;
  justify-content: space-between;
  font-size: 0.8rem;
  color: var(--ink-faded);
  margin-bottom: 12px;
}
.q-status .candidate {
  color: var(--ink-soft);
  max-width: 14em;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.progress {
  height: 4px;
  background: var(--line);
  border-radius: 4px;
  margin-bottom: 24px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--ink);
  transition: width 0.2s;
}

.q-tags {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
}
.tag-required {
  font-size: 0.72rem;
  font-weight: 600;
  color: white;
  background: var(--ink);
  padding: 3px 8px;
  border-radius: 3px;
  letter-spacing: 0.02em;
}
.tag-optional {
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--ink-faded);
  background: var(--bg-soft);
  padding: 3px 8px;
  border-radius: 3px;
}
.tag-time { font-size: 0.82rem; color: var(--ink-faded); }

.q-text {
  font-size: 1.25rem;
  font-weight: 600;
  line-height: 1.4;
  margin-bottom: 8px;
  color: var(--ink);
}

.q-skip-hint {
  font-size: 0.85rem;
  color: var(--ink-faded);
  margin-bottom: 24px;
}
.q-no-hint { margin-bottom: 24px; }

.expand-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: white;
  border: 1px solid var(--line-strong);
  border-radius: 5px;
  padding: 8px 12px;
  font: inherit;
  font-size: 0.85rem;
  color: var(--ink-soft);
  cursor: pointer;
  margin-bottom: 14px;
}
.expand-btn:hover { border-color: var(--ink-soft); }
.expand-btn .arrow { font-size: 0.7rem; transition: transform 0.15s; }
.expand-btn.open .arrow { transform: rotate(90deg); }

.drills-panel {
  display: none;
  background: var(--bg-soft);
  border-radius: 5px;
  padding: 14px 18px;
  margin-bottom: 24px;
}
.drills-panel.open { display: block; }
.drills-panel ol { padding-left: 22px; }
.drills-panel li {
  font-size: 0.92rem;
  color: var(--ink-soft);
  line-height: 1.6;
  padding: 2px 0;
}

.signals-list { margin-bottom: 6px; }

.sig-row {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 10px 0;
  cursor: pointer;
  border-bottom: 1px solid var(--line);
}
.sig-row:last-child { border-bottom: none; }
.sig-row input[type=checkbox] {
  appearance: none;
  -webkit-appearance: none;
  width: 22px;
  height: 22px;
  border: 1.5px solid var(--line-strong);
  border-radius: 4px;
  background: white;
  cursor: pointer;
  flex-shrink: 0;
  position: relative;
  margin-top: 0;
}
.sig-row input[type=checkbox]:hover { border-color: var(--ink-soft); }
.sig-row input[type=checkbox]:checked {
  background: var(--ink);
  border-color: var(--ink);
}
.sig-row input[type=checkbox]:checked::after {
  content: '';
  position: absolute;
  left: 6px; top: 2px;
  width: 6px; height: 11px;
  border: solid white;
  border-width: 0 2px 2px 0;
  transform: rotate(45deg);
}
.sig-row span {
  font-size: 0.95rem;
  color: var(--ink);
  line-height: 1.45;
  user-select: none;
  flex: 1;
}

.cross-toggle {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: none;
  border: none;
  font: inherit;
  font-size: 0.85rem;
  color: var(--ink-faded);
  cursor: pointer;
  padding: 12px 0;
}
.cross-toggle:hover { color: var(--ink-soft); }
.cross-panel { display: none; margin-bottom: 16px; }
.cross-panel.open { display: block; }

.notes-section { margin: 22px 0 16px; }

/* ── Bottom nav ──────────────────────────────────────────────────────── */

.nav {
  position: sticky;
  bottom: 0;
  background: linear-gradient(to bottom, rgba(255,255,255,0) 0%, var(--bg) 30%);
  padding: 16px 0 calc(16px + env(safe-area-inset-bottom));
  margin: 16px -20px 0;
  padding-left: 20px;
  padding-right: 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  z-index: 10;
}

.btn {
  font: inherit;
  font-weight: 600;
  font-size: 0.92rem;
  border-radius: 6px;
  border: 1px solid transparent;
  cursor: pointer;
  padding: 12px 20px;
  min-height: 46px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.btn-primary {
  background: var(--ink);
  color: white;
  border-color: var(--ink);
}
.btn-primary:hover { background: #000; }
.btn-secondary {
  background: white;
  color: var(--ink);
  border-color: var(--line-strong);
}
.btn-secondary:hover { border-color: var(--ink-soft); }
.btn-skip {
  background: none;
  border: none;
  color: var(--ink-faded);
  font: inherit;
  font-size: 0.88rem;
  cursor: pointer;
  padding: 12px;
  text-decoration: underline;
}
.btn-skip:hover { color: var(--ink-soft); }
.nav-actions { display: flex; align-items: center; gap: 4px; }

/* ── End screen ──────────────────────────────────────────────────────── */

.end-meta {
  font-size: 0.9rem;
  color: var(--ink-soft);
  margin-bottom: 28px;
}
.end-meta .sep { color: var(--line-strong); margin: 0 6px; }

.impression-row { display: flex; gap: 8px; margin-bottom: 28px; }
.imp-btn {
  flex: 1;
  padding: 12px 8px;
  background: white;
  border: 1.5px solid var(--line-strong);
  border-radius: 6px;
  font: inherit;
  font-size: 0.92rem;
  font-weight: 600;
  color: var(--ink-soft);
  cursor: pointer;
  min-height: 48px;
}
.imp-btn:hover { border-color: var(--ink-soft); }
.imp-btn.selected {
  background: var(--ink);
  border-color: var(--ink);
  color: white;
}

.sum-item {
  background: white;
  border: 1px solid var(--line);
  border-radius: 5px;
  padding: 12px 14px;
  margin-bottom: 8px;
}
.sum-item.skipped { opacity: 0.5; }
.sum-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 10px;
  margin-bottom: 4px;
}
.sum-label { font-weight: 600; font-size: 0.95rem; }
.sum-label em { font-style: normal; color: var(--ink-faded); font-weight: 400; font-size: 0.85rem; }
.sum-score { font-size: 0.8rem; color: var(--ink-faded); white-space: nowrap; }
.sum-signals-line { font-size: 0.85rem; color: var(--ink-soft); margin-top: 4px; line-height: 1.5; }
.sum-signals-line .check { color: var(--success); margin-right: 4px; font-weight: 600; }
.sum-notes {
  font-size: 0.9rem;
  color: var(--ink-soft);
  margin-top: 6px;
  white-space: pre-wrap;
  padding-left: 10px;
  border-left: 2px solid var(--line);
  line-height: 1.5;
}

.divider { height: 1px; background: var(--line); margin: 28px 0; }

.export-btn {
  width: 100%;
  padding: 14px;
  font-size: 1rem;
  background: var(--ink);
  color: white;
  border: none;
  border-radius: 6px;
  font: inherit;
  font-weight: 600;
  cursor: pointer;
  margin-top: 28px;
  min-height: 50px;
}
.export-btn:hover { background: #000; }
.end-actions { display: flex; gap: 8px; margin-top: 10px; }
.end-actions .btn { flex: 1; padding: 12px; font-size: 0.9rem; }

@media (max-width: 480px) {
  .app { padding: 16px 16px 24px; }
  .nav { margin: 16px -16px 0; padding-left: 16px; padding-right: 16px; }
  .q-text { font-size: 1.18rem; }
}

@media (prefers-reduced-motion: reduce) {
  * { transition: none !important; }
}
</style>
</head>
<body>
<main class="app" id="app">
  <!-- ────── Library ────── -->
  <section class="screen" id="screen-library">
    <header class="topbar">
      <div class="wordmark">Interviews <span class="light">· senior engineer</span></div>
    </header>

    <h1>Saved interviews</h1>
    <p class="sub">A simple tool for evaluating senior engineers. All data stays on this device.</p>

    <div class="library-stats" id="library-stats"></div>

    <div class="new-cta-row">
      <button class="new-cta" onclick="startNewInterview('hr')">+ New initial HR interview</button>
      <button class="new-cta new-cta-secondary" onclick="startNewInterview('technical')">+ New technical interview</button>
    </div>

    <div id="library-content"></div>

    <footer class="library-footer">
      <button class="footer-link" onclick="exportAllJSON()">Export backup (JSON)</button>
      <button class="footer-link" onclick="importBackup()">Import backup</button>
      <button class="footer-link danger" onclick="confirmWipe()">Delete all data</button>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="onImportFile(event)">
    </footer>
  </section>

  <!-- ────── Setup ────── -->
  <section class="screen" id="screen-setup">
    <header class="topbar">
      <button class="topbar-back" onclick="goLibrary()">Library</button>
      <div class="wordmark light" id="setup-wordmark">New interview</div>
    </header>

    <h1 id="setup-heading">New interview</h1>
    <p class="sub">Fill in candidate details to begin.</p>

    <div class="field">
      <label class="field-label" for="f-candidate">Candidate name <span class="req">*</span></label>
      <input type="text" id="f-candidate" placeholder="Jane Doe" autocomplete="off" autocapitalize="words" spellcheck="false">
    </div>
    <div class="field">
      <label class="field-label" for="f-role">Role</label>
      <input type="text" id="f-role" placeholder="Senior Engineer" autocomplete="off">
    </div>
    <div class="field">
      <label class="field-label" for="f-date">Date</label>
      <input type="date" id="f-date">
    </div>
    <div class="field">
      <label class="field-label" for="f-interviewer">Interviewer</label>
      <input type="text" id="f-interviewer" placeholder="Your name" autocomplete="off">
    </div>

    <div class="nav" style="margin-top:24px">
      <button class="btn btn-secondary" onclick="goLibrary()">Cancel</button>
      <button class="btn btn-primary" onclick="commitNewInterview()">Start →</button>
    </div>
  </section>

  <!-- ────── Question (dynamic) ────── -->
  <section class="screen" id="screen-question"></section>

  <!-- ────── End (dynamic) ────── -->
  <section class="screen" id="screen-end"></section>
</main>

<script>
const TECH_QUESTIONS = [
  {
    id: 'opening', label: '48h Production Access', required: true, time: '8–10 min',
    text: "Imagine you get production access to our system tomorrow. What do you try to understand in the first 48 hours?",
    drills: [
      "Tell me exactly what you'd do first.",
      "What risks would you look for?",
      "How would you figure out what's critical vs what can wait?",
      "What would you not touch yet — and why?"
    ],
    signals: [
      "Asked about risk before suggesting changes",
      "Mentioned observability / logs",
      "Asked about deploy / rollback process",
      "Mapped the critical path",
      "Asked about auth",
      "Asked questions before proposing anything",
      "Talked about domain, not just tech stack"
    ]
  },
  {
    id: 'incident', label: 'Most uncomfortable incident', required: true, time: '6–8 min',
    text: "Tell me about the most uncomfortable incident you've been through.",
    drills: [
      "Tell me exactly how that happened.",
      "What was the first signal?",
      "What did you do first?",
      "What went wrong?",
      "What would you do differently today?"
    ],
    signals: [
      "Named a specific incident (not generic)",
      'Said "I" not just "we"',
      "Named the first signal",
      "Described what went wrong",
      "Has a 'would do differently' answer",
      "Showed emotional honesty — not just technical summary"
    ]
  },
  {
    id: 'production_down', label: 'Took down production', required: true, time: '5–7 min',
    text: "Have you ever taken down production? Walk me through it.",
    drills: [
      "How did you find out?",
      "What was the root cause?",
      "How did you recover?",
      "What happened after — postmortem, follow-up action?"
    ],
    signals: [
      'Has actually done it (not "almost")',
      "Named root cause",
      "Named how they found out",
      "Described the recovery",
      "Postmortem or follow-up existed"
    ]
  },
  {
    id: 'hardest_bug', label: 'Hardest bug', required: true, time: '4–6 min',
    text: "What's the hardest bug you've ever debugged?",
    drills: [
      "Tell me exactly how that happened.",
      "What was the first signal?",
      "What tools did you use?",
      "How long did it take — and why longer than expected?"
    ],
    signals: [
      "Specific bug, not a category",
      "Described debugging process, not just the solution",
      "Named tools used",
      "Took longer than expected — and knows why"
    ]
  },
  {
    id: 'rollback', label: 'Emergency rollback', required: false, time: '4–5 min',
    skipHint: 'Skip if rollback already came up in the incident question.',
    text: "Have you ever had to do an emergency rollback? What triggered it?",
    drills: [
      "What triggered the decision?",
      "What was the rollback mechanism?",
      "What happened after?"
    ],
    signals: [
      "Has done it under pressure (not just planned)",
      "Knows the rollback mechanism at their company",
      "Describes what triggered the decision"
    ]
  },
  {

const QUESTION_SETS = { technical: TECH_QUESTIONS, hr: HR_QUESTIONS };
const TYPE_LABELS = { technical: 'Technical', hr: 'Initial HR' };
function qsFor(i) { return QUESTION_SETS[(i && i.type) || 'technical']; }
function labelFor(i) { return TYPE_LABELS[(i && i.type) || 'technical']; }

const CROSS_SIGNALS = [
  'Uses "I" consistently',
  'Names numbers / dates / specifics',
  'Asks clarifying questions',
  "Volunteers what they don't know"
];

const STORAGE_KEY = 'casebook_v1';

let store = { interviews: [] };
let currentId = null;

function loadStore() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) store = JSON.parse(saved);
    if (!Array.isArray(store.interviews)) store.interviews = [];
  } catch (e) { store = { interviews: [] }; }
}
function saveStore() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(store)); } catch (e) {}
}

function uuid() {
  if (crypto && crypto.randomUUID) return crypto.randomUUID();
  return 'id-' + Date.now() + '-' + Math.random().toString(36).slice(2, 10);
}

function newInterview(type) {
  return {
    id: uuid(),
    type: type || 'technical',
    candidate: '', role: '', date: '', interviewer: '',
    createdAt: Date.now(), updatedAt: Date.now(),
    answers: {}, currentIndex: 0,
    started: false, finished: false,
    impression: '', globalNotes: ''
  };
}

function getInterview(id) { return store.interviews.find(i => i.id === id); }

function getAnswer(interview, qid) {
  if (!interview.answers[qid]) {
    interview.answers[qid] = { signals: [], crossSignals: [], notes: '', skipped: false };
  }
  return interview.answers[qid];
}

function touch(interview) { interview.updatedAt = Date.now(); saveStore(); }

// ── Library ─────────────────────────────────────────────────────────────

function renderLibrary() {
  showScreen('screen-library');
  currentId = null;

  const list = [...store.interviews].sort((a, b) => b.updatedAt - a.updatedAt);
  const inProgress = list.filter(i => i.started && !i.finished);
  const completed = list.filter(i => i.finished);
  const drafts = list.filter(i => !i.started);

  const stats = document.getElementById('library-stats');
  stats.innerHTML = list.length
    ? `<span><strong>${list.length}</strong> total</span>
       ${inProgress.length ? `<span><strong>${inProgress.length}</strong> in progress</span>` : ''}
       ${completed.length ? `<span><strong>${completed.length}</strong> completed</span>` : ''}`
    : '';

  const content = document.getElementById('library-content');
  if (list.length === 0) {
    content.innerHTML = `
      <div class="empty-state">
        <strong>No interviews yet</strong>
        Tap one of the buttons above to begin.
      </div>`;
    return;
  }

  let html = '';
  if (inProgress.length) {
    html += `<div class="list-heading">In progress</div>`;
    html += `<div class="interview-list">${inProgress.map(cardHtml).join('')}</div>`;
  }
  if (completed.length) {
    html += `<div class="list-heading">Completed</div>`;
    html += `<div class="interview-list">${completed.map(cardHtml).join('')}</div>`;
  }
  if (drafts.length) {
    html += `<div class="list-heading">Drafts</div>`;
    html += `<div class="interview-list">${drafts.map(cardHtml).join('')}</div>`;
  }
  content.innerHTML = html;

  content.querySelectorAll('.interview-card').forEach(card => {
    card.addEventListener('click', () => openInterview(card.dataset.id));
  });
}

function cardHtml(i) {
  const done = Object.values(i.answers).filter(a => a.signals.length || a.crossSignals.length || a.notes || a.skipped).length;
  const total = qsFor(i).length;
  const typeLabel = labelFor(i);
  const typeCls = (i.type || 'technical') === 'hr' ? 'type-hr' : 'type-tech';

  let status = '';
  if (i.finished) {
    if (i.impression === 'strong_yes') status = `<span class="status status-strong">Strong yes</span>`;
    else if (i.impression === 'maybe') status = `<span class="status status-maybe">Maybe</span>`;
    else if (i.impression === 'no') status = `<span class="status status-no">No</span>`;
    else status = `<span class="status status-done">Completed</span>`;
  } else if (i.started) {
    status = `<span class="status status-progress">${done}/${total}</span>`;
  } else {
    status = `<span class="status status-draft">Draft</span>`;
  }

  const date = i.date || todayISO();
  return `
    <button class="interview-card" data-id="${i.id}">
      <div class="card-row">
        <span class="card-name">${esc(i.candidate || 'Unnamed candidate')}</span>
        <span class="card-meta">${esc(date)}</span>
      </div>
      <div class="card-detail">
        <span class="card-role"><span class="type-pill ${typeCls}">${esc(typeLabel)}</span>${esc(i.role || 'Senior Engineer')}${i.interviewer ? ' · ' + esc(i.interviewer) : ''}</span>
        ${status}
      </div>
    </button>`;
}

function openInterview(id) {
  const i = getInterview(id);
  if (!i) return;
  currentId = id;
  if (i.finished) renderEnd();
  else if (i.started) renderQuestion(i.currentIndex);
  else renderSetup(i);
}

function startNewInterview(type) {
  const i = newInterview(type);
  i.date = todayISO();
  store.interviews.push(i);
  saveStore();
  currentId = i.id;
  renderSetup(i);
}

function goLibrary() {
  const i = currentId ? getInterview(currentId) : null;
  if (i && !i.started && !i.candidate && !i.role && !i.interviewer) {
    store.interviews = store.interviews.filter(x => x.id !== i.id);
    saveStore();
  }
  renderLibrary();
}

// ── Setup ───────────────────────────────────────────────────────────────

function renderSetup(i) {
  showScreen('screen-setup');
  const label = labelFor(i);
  document.getElementById('setup-heading').textContent = `New ${label.toLowerCase()} interview`;
  document.getElementById('setup-wordmark').textContent = `New ${label.toLowerCase()} interview`;
  document.getElementById('f-candidate').value = i.candidate || '';
  document.getElementById('f-role').value = i.role || '';
  document.getElementById('f-date').value = i.date || todayISO();
  document.getElementById('f-interviewer').value = i.interviewer || '';
  setTimeout(() => document.getElementById('f-candidate').focus(), 50);
}

function commitNewInterview() {
  const i = getInterview(currentId);
  if (!i) return;
  const candidate = document.getElementById('f-candidate').value.trim();
  if (!candidate) {
    document.getElementById('f-candidate').focus();
    return;
  }
  i.candidate = candidate;
  i.role = document.getElementById('f-role').value.trim();
  i.date = document.getElementById('f-date').value;
  i.interviewer = document.getElementById('f-interviewer').value.trim();
  i.started = true;
  i.currentIndex = 0;
  touch(i);
  renderQuestion(0);
}

// ── Question ────────────────────────────────────────────────────────────

function renderQuestion(index) {
  const i = getInterview(currentId);
  if (!i) return goLibrary();
  i.currentIndex = index;
  touch(i);

  const qs = qsFor(i);
  const q = qs[index];
  const a = getAnswer(i, q.id);
  const total = qs.length;
  const pct = Math.round(((index) / total) * 100);

  const signalsHtml = q.signals.map((s, idx) => `
    <label class="sig-row">
      <input type="checkbox" data-type="signal" data-index="${idx}" ${a.signals.includes(idx) ? 'checked' : ''}>
      <span>${esc(s)}</span>
    </label>`).join('');

  const crossHtml = CROSS_SIGNALS.map((s, idx) => `
    <label class="sig-row">
      <input type="checkbox" data-type="cross" data-index="${idx}" ${a.crossSignals.includes(idx) ? 'checked' : ''}>
      <span>${esc(s)}</span>
    </label>`).join('');

  const html = `
    <header class="topbar">
      <button class="topbar-back" onclick="goLibrary()">Library</button>
      <div class="wordmark light">${esc(labelFor(i))} · ${index + 1} of ${total}</div>
    </header>

    <div class="q-status">
      <span>${esc(q.label)}</span>
      <span class="candidate">${esc(i.candidate)}</span>
    </div>

    <div class="progress"><div class="progress-fill" style="width:${pct}%"></div></div>

    <div class="q-tags">
      ${q.required ? '<span class="tag-required">REQUIRED</span>' : '<span class="tag-optional">OPTIONAL</span>'}
      <span class="tag-time">⏱ ${esc(q.time)}</span>
    </div>

    <h2 class="q-text">${esc(q.text)}</h2>
    ${q.skipHint
      ? `<div class="q-skip-hint">${esc(q.skipHint)}</div>`
      : `<div class="q-no-hint"></div>`}

    <button class="expand-btn" id="drills-btn" onclick="togglePanel('drills-btn','drills-panel')">
      <span class="arrow">▶</span><span>Drill prompts</span>
    </button>
    <div class="drills-panel" id="drills-panel">
      <ol>${q.drills.map(d => `<li>${esc(d)}</li>`).join('')}</ol>
    </div>

    <div class="section-label">Signals</div>
    <div class="signals-list">${signalsHtml}</div>

    <button class="cross-toggle" id="cross-btn" onclick="toggleCross()">▸ Cross-cutting signals</button>
    <div class="cross-panel" id="cross-panel">
      <div class="signals-list">${crossHtml}</div>
    </div>

    <div class="notes-section">
      <div class="section-label">Notes</div>
      <textarea id="notes-field" placeholder='Exact quotes go here. "We" vs "I" is data.' rows="4">${esc(a.notes || '')}</textarea>
    </div>

    <div class="nav">
      <div>
        ${index > 0 ? `<button class="btn btn-secondary" onclick="goBack()">← Back</button>` : '<span></span>'}
      </div>
      <div class="nav-actions">
        ${!q.required ? `<button class="btn-skip" onclick="skipQuestion()">Skip</button>` : ''}
        <button class="btn btn-primary" onclick="advance()">
          ${index === total - 1 ? 'Finish →' : 'Next →'}
        </button>
      </div>
    </div>`;

  const screen = document.getElementById('screen-question');
  screen.innerHTML = html;
  showScreen('screen-question');
  window.scrollTo(0, 0);

  screen.querySelectorAll('input[type=checkbox]').forEach(cb => {
    cb.addEventListener('change', onCheckbox);
  });
  document.getElementById('notes-field').addEventListener('input', onNotes);
}

function togglePanel(btnId, panelId) {
  document.getElementById(btnId).classList.toggle('open');
  document.getElementById(panelId).classList.toggle('open');
}
function toggleCross() {
  const p = document.getElementById('cross-panel');
  const b = document.getElementById('cross-btn');
  p.classList.toggle('open');
  b.textContent = (p.classList.contains('open') ? '▾' : '▸') + ' Cross-cutting signals';
}

function onCheckbox(e) {
  const cb = e.target;
  const i = getInterview(currentId);
  const q = qsFor(i)[i.currentIndex];
  const a = getAnswer(i, q.id);
  const arr = cb.dataset.type === 'signal' ? a.signals : a.crossSignals;
  const idx = parseInt(cb.dataset.index);
  if (cb.checked) { if (!arr.includes(idx)) arr.push(idx); }
  else { const j = arr.indexOf(idx); if (j !== -1) arr.splice(j, 1); }
  touch(i);
}

function onNotes(e) {
  const i = getInterview(currentId);
  const q = qsFor(i)[i.currentIndex];
  getAnswer(i, q.id).notes = e.target.value;
  touch(i);
}

function advance() {
  const i = getInterview(currentId);
  const qs = qsFor(i);
  const q = qs[i.currentIndex];
  const a = getAnswer(i, q.id);
  a.notes = document.getElementById('notes-field').value;
  a.skipped = false;
  if (i.currentIndex === qs.length - 1) {
    i.finished = true;
    touch(i);
    renderEnd();
  } else {
    renderQuestion(i.currentIndex + 1);
  }
}

function skipQuestion() {
  const i = getInterview(currentId);
  const qs = qsFor(i);
  const q = qs[i.currentIndex];
  const a = getAnswer(i, q.id);
  a.skipped = true;
  touch(i);
  if (i.currentIndex === qs.length - 1) {
    i.finished = true;
    touch(i);
    renderEnd();
  } else {
    renderQuestion(i.currentIndex + 1);
  }
}

function goBack() {
  const i = getInterview(currentId);
  if (i.currentIndex > 0) renderQuestion(i.currentIndex - 1);
}

// ── End ────────────────────────────────────────────────────────────────

function renderEnd() {
  const i = getInterview(currentId);
  if (!i) return goLibrary();

  const summaryHtml = qsFor(i).map(q => {
    const a = getAnswer(i, q.id);
    const checked = [
      ...a.signals.map(idx => q.signals[idx]),
      ...a.crossSignals.map(idx => CROSS_SIGNALS[idx])
    ];
    return `
      <div class="sum-item ${a.skipped ? 'skipped' : ''}">
        <div class="sum-header">
          <span class="sum-label">${esc(q.label)}${a.skipped ? ' <em>(skipped)</em>' : ''}</span>
          <span class="sum-score">${a.skipped ? '—' : checked.length + ' signal' + (checked.length !== 1 ? 's' : '')}</span>
        </div>
        ${checked.length ? `<div class="sum-signals-line"><span class="check">✓</span>${checked.map(esc).join(' · ')}</div>` : ''}
        ${a.notes ? `<div class="sum-notes">${esc(a.notes)}</div>` : ''}
      </div>`;
  }).join('');

  const impressions = [
    ['strong_yes', 'Strong Yes'],
    ['maybe', 'Maybe'],
    ['no', 'No']
  ];
  const impHtml = impressions.map(([val, label]) =>
    `<button class="imp-btn ${i.impression === val ? 'selected' : ''}" data-val="${val}" onclick="setImpression('${val}')">${label}</button>`
  ).join('');

  const html = `
    <header class="topbar">
      <button class="topbar-back" onclick="goLibrary()">Library</button>
      <div class="wordmark light">${esc(labelFor(i))} · Summary</div>
    </header>

    <h1>Interview complete</h1>
    <p class="end-meta">
      <span>${esc(i.candidate)}</span>
      ${i.role ? `<span class="sep">·</span><span>${esc(i.role)}</span>` : ''}
      ${i.date ? `<span class="sep">·</span><span>${esc(i.date)}</span>` : ''}
      ${i.interviewer ? `<span class="sep">·</span><span>${esc(i.interviewer)}</span>` : ''}
    </p>

    <div class="section-label">Overall impression</div>
    <div class="impression-row">${impHtml}</div>

    <div class="section-label">Global notes</div>
    <textarea id="global-notes" placeholder="Anything that didn't fit elsewhere..." rows="3">${esc(i.globalNotes || '')}</textarea>

    <div class="divider"></div>

    <div class="section-label">Question summary</div>
    <div class="summary">${summaryHtml}</div>

    <button class="export-btn" onclick="exportCSV()">Export as CSV</button>
    <div class="end-actions">
      <button class="btn btn-secondary" onclick="resumeEdit()">Edit answers</button>
      <button class="btn btn-secondary" onclick="goLibrary()">Back to library</button>
    </div>`;

  document.getElementById('screen-end').innerHTML = html;
  showScreen('screen-end');
  window.scrollTo(0, 0);

  document.getElementById('global-notes').addEventListener('input', e => {
    const cur = getInterview(currentId);
    cur.globalNotes = e.target.value;
    touch(cur);
  });
}

function setImpression(val) {
  const i = getInterview(currentId);
  i.impression = val;
  touch(i);
  document.querySelectorAll('.imp-btn').forEach(b => {
    b.classList.toggle('selected', b.dataset.val === val);
  });
}

function resumeEdit() {
  const i = getInterview(currentId);
  i.finished = false;
  touch(i);
  renderQuestion(i.currentIndex);
}

// ── Export / backup ────────────────────────────────────────────────────

function exportCSV() {
  const i = getInterview(currentId);
  const notes = document.getElementById('global-notes');
  if (notes) { i.globalNotes = notes.value; touch(i); }

  const header = ['candidate','role','date','interviewer','interview_type','question_id','question_label','required','skipped','signals_checked','signals_total','signals_list','notes'];
  const rows = [header];
  const typeLabel = labelFor(i);

  qsFor(i).forEach(q => {
    const a = getAnswer(i, q.id);
    const checked = [
      ...a.signals.map(idx => q.signals[idx]),
      ...a.crossSignals.map(idx => CROSS_SIGNALS[idx])
    ];
    rows.push([
      i.candidate, i.role, i.date, i.interviewer, typeLabel,
      q.id, q.label,
      q.required ? 'yes' : 'no',
      a.skipped ? 'yes' : 'no',
      checked.length,
      q.signals.length + CROSS_SIGNALS.length,
      checked.join('; '),
      a.notes || ''
    ]);
  });
  rows.push([
    i.candidate, i.role, i.date, i.interviewer, typeLabel,
    '_summary', 'Overall impression', '', '', '', '',
    i.impression || '', i.globalNotes || ''
  ]);

  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(',')).join('\n');
  const name = (i.candidate || 'candidate').replace(/\s+/g, '-').toLowerCase();
  const date = i.date || todayISO();
  const tag = (i.type || 'technical') === 'hr' ? 'hr' : 'tech';
  download(`${name}-${tag}-${date}.csv`, csv, 'text/csv');
}

function exportAllJSON() {
  if (store.interviews.length === 0) { alert('No interviews to export.'); return; }
  download(`interviews-backup-${todayISO()}.json`, JSON.stringify(store, null, 2), 'application/json');
}

function importBackup() {
  document.getElementById('import-file').click();
}

function onImportFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!data.interviews || !Array.isArray(data.interviews)) throw new Error('Invalid backup');
      const existingIds = new Set(store.interviews.map(i => i.id));
      const incoming = data.interviews.filter(i => !existingIds.has(i.id));
      if (incoming.length === 0) {
        alert('No new interviews to import (all already exist).');
        return;
      }
      if (!confirm(`Import ${incoming.length} interview(s)?`)) return;
      store.interviews.push(...incoming);
      saveStore();
      renderLibrary();
    } catch (err) {
      alert('Could not read backup file: ' + err.message);
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function download(filename, content, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content], { type: mime }));
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => {
    document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
  }, 100);
}

function confirmWipe() {
  if (!confirm('Delete ALL interviews on this device? This cannot be undone.')) return;
  if (!confirm('Are you absolutely sure? Export a backup first if you want to keep anything.')) return;
  localStorage.removeItem(STORAGE_KEY);
  store = { interviews: [] };
  renderLibrary();
}

// ── Utils ─────────────────────────────────────────────────────────────

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function esc(str) {
  return String(str ?? '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
function todayISO() { return new Date().toISOString().split('T')[0]; }

loadStore();
renderLibrary();
</script>
